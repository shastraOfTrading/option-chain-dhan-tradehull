<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>StrikeLens — NIFTY Option Chain</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'IBM Plex Sans',sans-serif;background:#f5f5f0;color:#1a1a1a;min-height:100vh}
:root{
  --green:#166534;--green-bg:#dcfce7;--green-border:#86efac;
  --red:#991b1b;--red-bg:#fee2e2;--red-border:#fca5a5;
  --amber:#92400e;--amber-bg:#fef3c7;--amber-border:#fcd34d;
  --blue:#1e40af;--blue-bg:#dbeafe;--blue-border:#93c5fd;
  --neutral:#374151;--neutral-bg:#f3f4f6;--neutral-border:#d1d5db;
  --atm-bg:#fef9c3;--atm-border:#fde047;
  --support-bg:#f0fdf4;--support-border:#4ade80;
  --resist-bg:#fef2f2;--resist-border:#f87171;
}

header{background:#fff;border-bottom:1px solid #e5e7eb;padding:12px 24px;display:flex;align-items:center;justify-content:space-between}
.logo{font-family:'IBM Plex Mono',monospace;font-size:18px;font-weight:500;letter-spacing:-0.5px;color:#1a1a1a}
.logo span{color:#6366f1}
.meta{display:flex;align-items:center;gap:16px;font-size:12px;color:#6b7280}
.live-dot{width:7px;height:7px;border-radius:50%;background:#22c55e;display:inline-block;margin-right:4px;animation:pulse 1.5s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.atm-badge{background:#1a1a1a;color:#fff;font-family:'IBM Plex Mono',monospace;font-size:12px;padding:3px 10px;border-radius:4px}

.main{max-width:100%;padding:18px 24px}

.top-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px;margin-bottom:18px}

.card{background:#fff;border:1px solid #e5e7eb;border-radius:10px;padding:16px 18px}
.card-label{font-size:11px;font-weight:500;letter-spacing:0.06em;text-transform:uppercase;color:#9ca3af;margin-bottom:8px}
.card-title{font-size:22px;font-weight:600;font-family:'IBM Plex Mono',monospace;margin-bottom:6px}
.card-reason{font-size:12px;color:#6b7280;line-height:1.5;margin-top:8px;border-top:1px solid #f3f4f6;padding-top:8px}
.card-stats{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-top:10px}
.stat{background:#f9fafb;border-radius:6px;padding:7px 10px}
.stat-label{font-size:10px;color:#9ca3af;text-transform:uppercase;letter-spacing:0.05em}
.stat-value{font-family:'IBM Plex Mono',monospace;font-size:13px;font-weight:500;color:#1a1a1a;margin-top:2px}
.stat-value.up{color:#16a34a}.stat-value.down{color:#dc2626}

.trend-bullish{border-left:4px solid #22c55e}
.trend-bearish{border-left:4px solid #ef4444}
.trend-neutral{border-left:4px solid #f59e0b}
.trend-tag{display:inline-block;font-size:11px;font-weight:600;padding:2px 10px;border-radius:4px;letter-spacing:0.06em;text-transform:uppercase;margin-bottom:8px}
.tag-bull{background:#dcfce7;color:#15803d}
.tag-bear{background:#fee2e2;color:#b91c1c}
.tag-neutral{background:#fef3c7;color:#b45309}
.trend-explain{font-size:12px;color:#4b5563;line-height:1.6;margin-top:6px}

.card-support{border-left:4px solid #22c55e}
.card-resist{border-left:4px solid #ef4444}

.section-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.section-title{font-size:12px;font-weight:500;letter-spacing:0.06em;text-transform:uppercase;color:#6b7280}
.legend{display:flex;gap:12px;flex-wrap:wrap;align-items:center}
.leg{display:flex;align-items:center;gap:5px;font-size:11px;color:#6b7280}
.leg-dot{width:10px;height:10px;border-radius:2px}

table{width:100%;border-collapse:collapse;font-size:12px;background:#fff;border-radius:10px;overflow:hidden;border:1px solid #e5e7eb}
thead tr{background:#f9fafb;border-bottom:2px solid #e5e7eb}
th{padding:9px 10px;font-size:10px;font-weight:600;letter-spacing:0.07em;text-transform:uppercase;color:#6b7280}
th.ce{text-align:right;color:#1e40af}
th.pe{text-align:left;color:#b91c1c}
th.strike-h{text-align:center;background:#f3f4f6;color:#374151}

tbody tr{border-bottom:1px solid #f3f4f6;transition:background 0.1s}
tbody tr:hover{background:#f9fafb!important}
td{padding:8px 10px;font-family:'IBM Plex Mono',monospace;font-size:12px;color:#374151}
td.ce{text-align:right}
td.pe{text-align:left}
td.strike-cell{text-align:center;font-weight:500;font-size:13px;background:#fafafa;color:#1a1a1a}

tr.atm-row td{background:var(--atm-bg)!important}
tr.atm-row td.strike-cell{background:#fef08a!important;font-weight:700;color:#854d0e}
tr.support-row td{background:var(--support-bg)!important}
tr.support-row td.strike-cell{background:#bbf7d0!important;color:#15803d;font-weight:700}
tr.resist-row td{background:var(--resist-bg)!important}
tr.resist-row td.strike-cell{background:#fecaca!important;color:#b91c1c;font-weight:700}

td.hl-ce-oi{background:#dbeafe!important;color:#1e3a8a;font-weight:500}
td.hl-pe-oi{background:#fee2e2!important;color:#7f1d1d;font-weight:500}
td.hl-ce-vol{background:#ede9fe!important;color:#3730a3;font-weight:500}
td.hl-pe-vol{background:#fce7f3!important;color:#831843;font-weight:500}

.doi-up{color:#16a34a}
.doi-dn{color:#dc2626}
.doi-neu{color:#9ca3af}

.tooltip{position:fixed;background:#1a1a1a;color:#fff;border-radius:8px;padding:12px 14px;font-size:11px;pointer-events:none;z-index:9999;min-width:200px;line-height:1.7;display:none;box-shadow:0 4px 24px rgba(0,0,0,0.18)}
.tooltip-strike{font-family:'IBM Plex Mono',monospace;font-size:15px;font-weight:500;margin-bottom:6px;color:#f9fafb}
.tooltip-grid{display:grid;grid-template-columns:1fr 1fr;gap:4px 12px}
.tooltip-label{color:#9ca3af;font-size:10px}
.tooltip-val{color:#fff;font-size:11px;font-weight:500}
.tooltip-interp{margin-top:8px;padding-top:6px;border-top:1px solid #374151;color:#d1d5db;font-size:10px;line-height:1.5}

.who-stronger{background:#fff;border:1px solid #e5e7eb;border-radius:10px;padding:14px 18px;margin-bottom:14px;display:flex;align-items:center;gap:14px}
.ws-label{font-size:11px;text-transform:uppercase;letter-spacing:0.06em;color:#9ca3af;font-weight:500}
.ws-bar-wrap{flex:1;height:10px;background:#f3f4f6;border-radius:99px;overflow:hidden;position:relative}
.ws-bar-ce{position:absolute;left:0;top:0;height:100%;background:#3b82f6;border-radius:99px 0 0 99px;transition:width 0.4s}
.ws-bar-pe{position:absolute;right:0;top:0;height:100%;background:#ef4444;border-radius:0 99px 99px 0;transition:width 0.4s}
.ws-ce-label{font-size:11px;color:#1e40af;font-weight:500;white-space:nowrap}
.ws-pe-label{font-size:11px;color:#b91c1c;font-weight:500;white-space:nowrap}

.loading{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:300px;color:#9ca3af;font-size:14px;gap:12px}
.spinner{width:32px;height:32px;border:2px solid #e5e7eb;border-top-color:#6366f1;border-radius:50%;animation:spin 0.8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

.error-msg{background:#fee2e2;border:1px solid #fca5a5;border-radius:8px;padding:14px 18px;color:#991b1b;font-size:13px;margin:20px 0}
.refresh-btn{background:#1a1a1a;color:#fff;border:none;border-radius:6px;padding:6px 14px;font-size:12px;cursor:pointer;font-family:'IBM Plex Sans',sans-serif;transition:background 0.15s}
.refresh-btn:hover{background:#374151}

.atm-label{font-size:9px;background:#1a1a1a;color:#fef08a;border-radius:3px;padding:1px 5px;vertical-align:middle;margin-left:4px}
.sup-label{font-size:9px;background:#15803d;color:#fff;border-radius:3px;padding:1px 5px;vertical-align:middle;margin-left:4px}
.res-label{font-size:9px;background:#b91c1c;color:#fff;border-radius:3px;padding:1px 5px;vertical-align:middle;margin-left:4px}
</style>
</head>
<body>
<header>
  <div class="logo">Strike<span>Lens</span></div>
  <div class="meta">
    <span><span class="live-dot"></span>Live</span>
    <span id="atm-display" class="atm-badge">ATM —</span>
    <span id="last-update">–</span>
    <button class="refresh-btn" onclick="loadData()">↻ Refresh</button>
  </div>
</header>

<div class="main">
  <div id="content-area">
    <div class="loading">
      <div class="spinner"></div>
      <span>Fetching option chain…</span>
    </div>
  </div>
</div>

<div class="tooltip" id="tooltip">
  <div class="tooltip-strike" id="tt-strike"></div>
  <div class="tooltip-grid">
    <div><div class="tooltip-label">CE OI</div><div class="tooltip-val" id="tt-ce-oi"></div></div>
    <div><div class="tooltip-label">PE OI</div><div class="tooltip-val" id="tt-pe-oi"></div></div>
    <div><div class="tooltip-label">CE ΔOI</div><div class="tooltip-val" id="tt-ce-doi"></div></div>
    <div><div class="tooltip-label">PE ΔOI</div><div class="tooltip-val" id="tt-pe-doi"></div></div>
    <div><div class="tooltip-label">CE Vol</div><div class="tooltip-val" id="tt-ce-vol"></div></div>
    <div><div class="tooltip-label">PE Vol</div><div class="tooltip-val" id="tt-pe-vol"></div></div>
    <div><div class="tooltip-label">CE LTP</div><div class="tooltip-val" id="tt-ce-ltp"></div></div>
    <div><div class="tooltip-label">PE LTP</div><div class="tooltip-val" id="tt-pe-ltp"></div></div>
  </div>
  <div class="tooltip-interp" id="tt-interp"></div>
</div>

<script>
const fmt=v=>v>=1e7?(v/1e7).toFixed(2)+'Cr':v>=1e5?(v/1e5).toFixed(2)+'L':v>=1e3?(v/1e3).toFixed(1)+'K':String(Math.round(v));
const fmtN=v=>(v>=0?'+':'')+fmt(Math.abs(v))+(v>=0?'':' ↓');

function interpretRow(r,atm){
  const s=r.strike;
  const parts=[];
  if(r.atm) parts.push('ATM strike — highest gamma zone, most liquid.');
  const ceDoi=r.ce_doi,peDoi=r.pe_doi;
  const ceOi=r.ce_oi,peOi=r.pe_oi;
  if(ceDoi>0&&ceOi>0) parts.push(`Fresh call writing: ${fmt(ceDoi)} new CE OI added.`);
  if(peDoi>0&&peOi>0) parts.push(`Fresh put writing: ${fmt(peDoi)} new PE OI added.`);
  if(ceDoi<0) parts.push(`CE unwinding: ${fmt(Math.abs(ceDoi))} contracts exited.`);
  if(peDoi<0) parts.push(`PE unwinding: ${fmt(Math.abs(peDoi))} contracts exited.`);
  if(r.max_ce_oi) parts.push('Highest CE OI in chain — major resistance zone.');
  if(r.max_pe_oi) parts.push('Highest PE OI in chain — major support zone.');
  if(r.max_ce_vol) parts.push('Highest CE volume — active call trading this strike.');
  if(r.max_pe_vol) parts.push('Highest PE volume — active put trading this strike.');
  if(r.support) parts.push('Selected as Strongest Support — best put writing score below ATM.');
  if(r.resistance) parts.push('Selected as Strongest Resistance — best call writing score above ATM.');
  return parts.length?parts.join(' '):'No significant activity at this strike.';
}

function doiClass(v){return v>0?'doi-up':v<0?'doi-dn':'doi-neu';}
function doiText(v){if(v===0)return '—';return (v>0?'+':'')+fmt(Math.abs(v));}

function buildTrendCard(data){
  const {chain,atm}=data;
  const below=chain.filter(r=>r.strike<atm);
  const above=chain.filter(r=>r.strike>atm);
  const totalPeDoi=below.reduce((a,r)=>a+r.pe_doi,0);
  const totalCeDoi=above.reduce((a,r)=>a+r.ce_doi,0);
  const netDoi=totalPeDoi-totalCeDoi;
  let trend,tag,tagCls,explain;
  if(totalPeDoi>0&&totalCeDoi<=0){
    trend='Bullish';tagCls='tag-bull';
    explain=`Puts below ATM are being written (ΔOI +${fmt(totalPeDoi)}), while no fresh call writing above ATM. Put writers defending lower levels — directional bias is up.`;
  } else if(totalCeDoi>0&&totalPeDoi<=0){
    trend='Bearish';tagCls='tag-bear';
    explain=`Calls above ATM are being written aggressively (ΔOI +${fmt(totalCeDoi)}), while puts below ATM are not being added. Call writers capping upside — directional bias is down.`;
  } else if(totalCeDoi>0&&totalPeDoi>0){
    if(totalPeDoi>totalCeDoi*1.2){
      trend='Bullish';tagCls='tag-bull';
      explain=`Both sides active, but fresh put writing (+${fmt(totalPeDoi)}) dominates over call writing (+${fmt(totalCeDoi)}). Net OI change favors bulls.`;
    } else if(totalCeDoi>totalPeDoi*1.2){
      trend='Bearish';tagCls='tag-bear';
      explain=`Both sides active, but fresh call writing (+${fmt(totalCeDoi)}) dominates over put writing (+${fmt(totalPeDoi)}). Net OI change favors bears.`;
    } else {
      trend='Neutral';tagCls='tag-neutral';
      explain=`Balanced fresh writing on both sides — CE ΔOI +${fmt(totalCeDoi)}, PE ΔOI +${fmt(totalPeDoi)}. Market is consolidating around ATM.`;
    }
  } else {
    trend='Neutral';tagCls='tag-neutral';
    explain=`No significant fresh writing detected on either side. CE ΔOI ${doiText(totalCeDoi)}, PE ΔOI ${doiText(totalPeDoi)}. Wait for a clearer signal.`;
  }
  return `<div class="card-label">Trend signal</div>
<div><span class="trend-tag ${tagCls}">${trend}</span></div>
<div class="trend-explain">${explain}</div>`;
}

function buildReasonText(type,r,data){
  const oiField=type==='support'?'pe_oi':'ce_oi';
  const doiField=type==='support'?'pe_doi':'ce_doi';
  const volField=type==='support'?'pe_vol':'ce_vol';
  const side=type==='support'?'Put':'Call';
  const oiFmt=fmt(r[oiField]);
  const doiStr=r[doiField]>0?`Fresh ${side} writing of +${fmt(r[doiField])}`:`${side} OI change: ${doiText(r[doiField])}`;
  const volStr=`${side} volume: ${fmt(r[volField])}`;
  return `${r.strike} selected — highest weighted ${side} OI score below ATM. ${oiFmt} total ${side} OI. ${doiStr}. ${volStr}. ${type==='support'?'Writers defending this level.':'Writers capping upside here.'}`;
}

function buildWhoStronger(data){
  const totalCeOi=data.chain.reduce((a,r)=>a+r.ce_oi,0);
  const totalPeOi=data.chain.reduce((a,r)=>a+r.pe_oi,0);
  const total=totalCeOi+totalPeOi||1;
  const cePct=Math.round(totalCeOi/total*100);
  const pePct=100-cePct;
  const stronger=cePct>pePct?'Call writers stronger':'Put writers stronger';
  return `<div class="ws-ce-label">CE OI ${cePct}%</div>
<div class="ws-bar-wrap">
  <div class="ws-bar-ce" style="width:${cePct}%"></div>
  <div class="ws-bar-pe" style="width:${pePct}%"></div>
</div>
<div class="ws-pe-label">${pePct}% PE OI</div>
<div style="font-size:11px;color:#374151;font-weight:500;white-space:nowrap">${stronger}</div>`;
}

function renderDashboard(data){
  const trendCls=
    data.trend==='Bullish'?'trend-bullish':
    data.trend==='Bearish'?'trend-bearish':'trend-neutral';

  const supR=data.chain.find(r=>r.support);
  const resR=data.chain.find(r=>r.resistance);

  let html=`
<div class="top-grid">
  <div class="card ${trendCls}">${buildTrendCard(data)}</div>
  <div class="card card-support">
    <div class="card-label">Strongest support</div>
    <div class="card-title" style="color:#15803d">${data.support.strike}</div>
    <div class="card-stats">
      <div class="stat"><div class="stat-label">PE OI</div><div class="stat-value">${fmt(data.support.oi)}</div></div>
      <div class="stat"><div class="stat-label">PE ΔOI</div><div class="stat-value ${data.support.doi>=0?'up':'down'}">${doiText(data.support.doi)}</div></div>
      <div class="stat"><div class="stat-label">PE Vol</div><div class="stat-value">${fmt(data.support.vol)}</div></div>
    </div>
    <div class="card-reason">${supR?buildReasonText('support',supR,data):data.support.reason}</div>
  </div>
  <div class="card card-resist">
    <div class="card-label">Strongest resistance</div>
    <div class="card-title" style="color:#b91c1c">${data.resistance.strike}</div>
    <div class="card-stats">
      <div class="stat"><div class="stat-label">CE OI</div><div class="stat-value">${fmt(data.resistance.oi)}</div></div>
      <div class="stat"><div class="stat-label">CE ΔOI</div><div class="stat-value ${data.resistance.doi>=0?'up':'down'}">${doiText(data.resistance.doi)}</div></div>
      <div class="stat"><div class="stat-label">CE Vol</div><div class="stat-value">${fmt(data.resistance.vol)}</div></div>
    </div>
    <div class="card-reason">${resR?buildReasonText('resistance',resR,data):data.resistance.reason}</div>
  </div>
</div>

<div class="who-stronger">${buildWhoStronger(data)}</div>

<div class="section-header">
  <span class="section-title">Option Chain — NIFTY</span>
  <div class="legend">
    <span class="leg"><span class="leg-dot" style="background:#fef08a;border:1px solid #fde047"></span>ATM</span>
    <span class="leg"><span class="leg-dot" style="background:#bbf7d0;border:1px solid #4ade80"></span>Support</span>
    <span class="leg"><span class="leg-dot" style="background:#fecaca;border:1px solid #f87171"></span>Resistance</span>
    <span class="leg"><span class="leg-dot" style="background:#dbeafe;border:1px solid #93c5fd"></span>Highest CE OI</span>
    <span class="leg"><span class="leg-dot" style="background:#fee2e2;border:1px solid #fca5a5"></span>Highest PE OI</span>
    <span class="leg"><span class="leg-dot" style="background:#ede9fe;border:1px solid #c4b5fd"></span>Highest CE Vol</span>
    <span class="leg"><span class="leg-dot" style="background:#fce7f3;border:1px solid #f9a8d4"></span>Highest PE Vol</span>
  </div>
</div>

<table>
<thead>
<tr>
  <th class="ce" style="width:11%">CE OI</th>
  <th class="ce" style="width:9%">CE ΔOI</th>
  <th class="ce" style="width:9%">CE Vol</th>
  <th class="ce" style="width:8%">CE LTP</th>
  <th class="strike-h" style="width:10%">Strike</th>
  <th class="pe" style="width:8%">PE LTP</th>
  <th class="pe" style="width:9%">PE Vol</th>
  <th class="pe" style="width:9%">PE ΔOI</th>
  <th class="pe" style="width:11%">PE OI</th>
</tr>
</thead>
<tbody id="chain-body"></tbody>
</table>`;

  document.getElementById('content-area').innerHTML=html;
  document.getElementById('atm-display').textContent='ATM '+data.atm;
  document.getElementById('last-update').textContent=new Date().toLocaleTimeString('en-IN',{hour:'2-digit',minute:'2-digit',second:'2-digit'});

  const tbody=document.getElementById('chain-body');
  data.chain.forEach(r=>{
    const rowCls=r.atm?'atm-row':r.support?'support-row':r.resistance?'resist-row':'';
    const strikeLbl=r.atm?`${r.strike}<span class="atm-label">ATM</span>`:
                   r.support?`${r.strike}<span class="sup-label">SUP</span>`:
                   r.resistance?`${r.strike}<span class="res-label">RES</span>`:r.strike;
    const ceOiCls=r.max_ce_oi?'hl-ce-oi':'';
    const peOiCls=r.max_pe_oi?'hl-pe-oi':'';
    const ceVolCls=r.max_ce_vol?'hl-ce-vol':'';
    const peVolCls=r.max_pe_vol?'hl-pe-vol':'';
    const tr=document.createElement('tr');
    tr.className=rowCls;
    tr.innerHTML=`
      <td class="ce ${ceOiCls}">${fmt(r.ce_oi)}</td>
      <td class="ce"><span class="${doiClass(r.ce_doi)}">${doiText(r.ce_doi)}</span></td>
      <td class="ce ${ceVolCls}">${fmt(r.ce_vol)}</td>
      <td class="ce">${r.ce_ltp||'—'}</td>
      <td class="strike-cell">${strikeLbl}</td>
      <td class="pe">${r.pe_ltp||'—'}</td>
      <td class="pe ${peVolCls}">${fmt(r.pe_vol)}</td>
      <td class="pe"><span class="${doiClass(r.pe_doi)}">${doiText(r.pe_doi)}</span></td>
      <td class="pe ${peOiCls}">${fmt(r.pe_oi)}</td>`;
    tr.dataset.row=JSON.stringify(r);
    tr.dataset.interp=interpretRow(r,data.atm);
    tbody.appendChild(tr);
  });

  setupTooltips(data.atm);
}

function setupTooltips(atm){
  const tt=document.getElementById('tooltip');
  document.querySelectorAll('#chain-body tr').forEach(tr=>{
    tr.addEventListener('mouseenter',e=>{
      const r=JSON.parse(tr.dataset.row);
      document.getElementById('tt-strike').textContent=r.strike+(r.atm?' (ATM)':r.support?' ◀ Support':r.resistance?' ▶ Resist':'');
      document.getElementById('tt-ce-oi').textContent=fmt(r.ce_oi);
      document.getElementById('tt-pe-oi').textContent=fmt(r.pe_oi);
      document.getElementById('tt-ce-doi').textContent=doiText(r.ce_doi);
      document.getElementById('tt-pe-doi').textContent=doiText(r.pe_doi);
      document.getElementById('tt-ce-vol').textContent=fmt(r.ce_vol);
      document.getElementById('tt-pe-vol').textContent=fmt(r.pe_vol);
      document.getElementById('tt-ce-ltp').textContent=r.ce_ltp||'—';
      document.getElementById('tt-pe-ltp').textContent=r.pe_ltp||'—';
      document.getElementById('tt-interp').textContent=tr.dataset.interp;
      tt.style.display='block';
    });
    tr.addEventListener('mousemove',e=>{
      const x=e.clientX+16,y=e.clientY-10;
      tt.style.left=Math.min(x,window.innerWidth-220)+'px';
      tt.style.top=y+'px';
    });
    tr.addEventListener('mouseleave',()=>{tt.style.display='none';});
  });
}

async function loadData(){
  try{
    const r=await fetch('/api/data');
    if(!r.ok) throw new Error('HTTP '+r.status);
    const data=await r.json();
    renderDashboard(data);
  } catch(err){
    document.getElementById('content-area').innerHTML=`
      <div class="error-msg">
        <strong>Could not fetch live data.</strong><br>
        ${err.message}<br><br>
        Make sure <code>strikelens.py</code> is running on port 8080 and the Dhan access token is valid.
        <br><br><button class="refresh-btn" onclick="loadData()">↻ Retry</button>
      </div>
      <div id="demo-hint" style="margin-top:18px">
        <button class="refresh-btn" style="background:#6366f1" onclick="loadDemo()">▶ Load Demo Data</button>
        <span style="font-size:12px;color:#9ca3af;margin-left:10px">Preview with sample data</span>
      </div>`;
  }
}

function loadDemo(){
  const atm=24500;
  const strikes=[24000,24100,24200,24300,24400,24500,24600,24700,24800,24900,25000];
  const chain=strikes.map((s,i)=>{
    const dist=Math.abs(s-atm)/100;
    const base=Math.max(0.1,1-dist*0.08);
    const r={
      strike:s,
      ce_oi:Math.round(base*(1200000+Math.random()*400000)),
      ce_doi:Math.round((Math.random()-0.3)*120000),
      ce_vol:Math.round(base*(300000+Math.random()*200000)),
      ce_ltp:+(Math.max(1,(atm-s)/3+10+Math.random()*20)).toFixed(1),
      pe_oi:Math.round(base*(1100000+Math.random()*400000)),
      pe_doi:Math.round((Math.random()-0.25)*120000),
      pe_vol:Math.round(base*(280000+Math.random()*200000)),
      pe_ltp:+(Math.max(1,(s-atm)/3+10+Math.random()*20)).toFixed(1),
      atm:s===atm,support:false,resistance:false,
      max_ce_oi:false,max_pe_oi:false,max_ce_vol:false,max_pe_vol:false
    };
    if(s===24200){r.pe_oi=2800000;r.pe_doi=320000;}
    if(s===24800){r.ce_oi=2600000;r.ce_doi=280000;}
    return r;
  });
  const below=chain.filter(r=>r.strike<atm);
  const above=chain.filter(r=>r.strike>atm);
  below.forEach(r=>{r.score=r.pe_oi*0.5+Math.max(0,r.pe_doi)*0.3+r.pe_vol*0.2;});
  above.forEach(r=>{r.score=r.ce_oi*0.5+Math.max(0,r.ce_doi)*0.3+r.ce_vol*0.2;});
  const sup=below.sort((a,b)=>b.score-a.score)[0];
  const res=above.sort((a,b)=>b.score-a.score)[0];
  chain.find(r=>r.strike===sup.strike).support=true;
  chain.find(r=>r.strike===res.strike).resistance=true;
  const maxCeOi=Math.max(...chain.map(r=>r.ce_oi));
  const maxPeOi=Math.max(...chain.map(r=>r.pe_oi));
  const maxCeVol=Math.max(...chain.map(r=>r.ce_vol));
  const maxPeVol=Math.max(...chain.map(r=>r.pe_vol));
  chain.forEach(r=>{
    r.max_ce_oi=r.ce_oi===maxCeOi;
    r.max_pe_oi=r.pe_oi===maxPeOi;
    r.max_ce_vol=r.ce_vol===maxCeVol;
    r.max_pe_vol=r.pe_vol===maxPeVol;
  });
  renderDashboard({
    atm,chain,
    support:{strike:sup.strike,oi:sup.pe_oi,doi:sup.pe_doi,vol:sup.pe_vol,reason:'Demo'},
    resistance:{strike:res.strike,oi:res.ce_oi,doi:res.ce_doi,vol:res.ce_vol,reason:'Demo'}
  });
}

loadData();
</script>
